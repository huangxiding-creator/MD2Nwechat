# MD2Nwechat 配置文件

# TOML 格式（支持 .toml 手缀）

[general]
# Markdown 文件夹路径
markdown_folder = "./markdown"
# 封面图片文件夹路径
cover_folder = "./covers"
# 默认封面图片（当找不到对应封面时使用）
default_cover = ./cover.jpg
# 转换模式: api（使用 md2wechat.cn API）或 ai（使用 AI 生成）
convert_mode = api
# 发送间隔（秒）- 避免触发微信 API 限流
send_interval = 3
# 最大重试次数
max_retries = 3
# 日志级别：debug, info, warn, error
log_level = info
# 是否启用详细输出
verbose = true

# 主题轮换列表（每篇文章依次使用不同主题）
rotation_themes = autumn-warm,spring-fresh,ocean-calm,elegant-gold,minimal-blue,focus-green

[accounts]
# 账号列表（用逗号分隔，账号标识）
# 推送时会按顺序轮换使用这些账号
account_list = zongbaozhisheng,gongchengbao,zongbaoshuo

