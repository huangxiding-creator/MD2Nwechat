[api]
# md2wechat.cn API 配置
api_key =
api_base_url = https://www.md2wechat.cn
timeout = 30

[images]
# 图片生成服务配置
# provider: zhipu (智谱), modelscope, openai, openrouter
provider = zhipu
# 智谱大模型 API Key
api_key = 810287c9375844c1a15fc546721cd69c.xnkuiMfecV06kE8q
api_base = https://open.bigmodel.cn/api/paas/v4/
model = cogview-3-plus
size = 1024x1024
compress = true
max_width = 1920
max_size_mb = 5

[advanced]
# 批量处理时的并发数
concurrency = 1
# 失败时是否继续处理下一篇文章
continue_on_error = true
# 保存处理状态（用于断点续传）
save_state = true
state_file = ./md2nwechat_state.json
