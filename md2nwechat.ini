# MD2Nwechat 批量推送配置文件
# Markdown 批量推送到微信公众号草稿箱

[general]
# Markdown 文件夹路径
markdown_folder = ./markdown
# 封面图片文件夹路径
cover_folder = ./covers
# 默认封面图片（当找不到对应封面时使用）
default_cover = ./cover.jpg
# 转换模式：api（使用 md2wechat.cn API）或 ai（使用 AI 生成）
convert_mode = api
# 发送间隔（秒）- 避免触发微信 API 限流
send_interval = 3
# 最大重试次数
max_retries = 3
# 日志级别：debug, info, warn, error
log_level = info
# 是否启用详细输出
verbose = true

[accounts]
# 公众号列表（用逗号分隔的账号名称）
# 推送时会按顺序轮换使用这些账号
account_list = zongbaozhisheng,gongchengbao,zongbaoshuo

# 总包之声公众号
[account.zongbaozhisheng]
name = 总包之声
appid = wxab4386f9c12d3636
secret = ff9f895ed854f5df15ff88ec8b69f818
enabled = true
# 该账号的主题偏好（可选，不填则使用全局主题轮换）
preferred_themes = autumn-warm,elegant-gold,apple

# 工程豹公众号
[account.gongchengbao]
name = 工程豹
appid = wxab4386f9c12d3636
secret = ff9f895ed854f5df15ff88ec8b69f818
enabled = true
preferred_themes = ocean-calm,bytedance,sports

# 总包说公众号
[account.zongbaoshuo]
name = 总包说
appid = wx580e54435d78a2b7
secret = a3a294fbe9805b4cf65927d1282ab076
enabled = true
preferred_themes = spring-fresh,chinese,focus-green

[themes]
# 主题轮换列表（每篇文章依次使用不同主题）
# 支持的主题：
# API 模式（38个）: default, bytedance, apple, sports, chinese, cyber
#   minimal-gold/green/blue/orange/red/navy/gray/sky
#   focus-gold/green/blue/orange/red/navy/gray/sky
#   elegant-gold/green/blue/orange/red/navy/gray/sky
#   bold-gold/green/blue/orange/red/navy/gray/sky
# AI 模式（3个）: autumn-warm, spring-fresh, ocean-calm
rotation_list = autumn-warm,spring-fresh,ocean-calm,elegant-gold,minimal-blue,focus-green

[api]
# md2wechat.cn API 配置（API 模式需要）
api_key =
api_base_url = https://www.md2wechat.cn
# API 超时时间（秒）
timeout = 30

[images]
# 图片生成服务配置
# 支持的服务：openai, modelscope, tuzi
provider = modelscope
api_key =
api_base = https://api-inference.modelscope.cn
model = Tongyi-MAI/Z-Image-Turbo
# 图片尺寸（推荐 16:9 用于封面）
size = 1024x1024
# 自动压缩大图
compress = true
# 最大图片宽度
max_width = 1920
# 最大文件大小（MB）
max_size_mb = 5

[advanced]
# 批量处理时的并发数（建议 1-3，避免触发限流）
concurrency = 1
# 失败时是否继续处理下一篇文章
continue_on_error = true
# 保存处理状态（用于断点续传）
save_state = true
state_file = ./md2nwechat_state.json
